name: Deploy (environments)

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options: [dev, test, prod]

env:
  APP_NAME: my-app
  REGISTRY: registry.mysite.com
  CHART_REPO: username/k8s

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        run: echo "${{ secrets.REGISTRY_PASS }}" | docker login $REGISTRY -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build and push image
        run: |
          docker build -t $REGISTRY/$APP_NAME:${{ github.sha }} -t $REGISTRY/$APP_NAME:latest .
          docker push $REGISTRY/$APP_NAME:${{ github.sha }}
          docker push $REGISTRY/$APP_NAME:latest

  deploy-dev:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || inputs.environment == 'dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Checkout Helm chart
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CHART_REPO }}
          path: k8s-charts
          sparse-checkout: charts/app

      - name: Deploy to dev
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          helm upgrade --install $APP_NAME k8s-charts/charts/app \
            -f helm-values.dev.yaml \
            --set image.tag=${{ needs.build.outputs.image-tag }} \
            -n dev --create-namespace

  deploy-test:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || inputs.environment == 'test'
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Checkout Helm chart
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CHART_REPO }}
          path: k8s-charts
          sparse-checkout: charts/app

      - name: Deploy to test
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          helm upgrade --install $APP_NAME k8s-charts/charts/app \
            -f helm-values.test.yaml \
            --set image.tag=${{ needs.build.outputs.image-tag }} \
            -n test --create-namespace

  deploy-prod:
    needs: [build, deploy-test]
    if: startsWith(github.ref, 'refs/tags/v') || inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Checkout Helm chart
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CHART_REPO }}
          path: k8s-charts
          sparse-checkout: charts/app

      - name: Deploy to prod
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          helm upgrade --install $APP_NAME k8s-charts/charts/app \
            -f helm-values.prod.yaml \
            --set image.tag=${{ needs.build.outputs.image-tag }} \
            -n prod --create-namespace
