# Prod environment — higher resources, multiple replicas, stricter probes.

name: my-app
namespace: prod

replicas: 2

ingress:
  hosts:
    - my-app.mysite.com

probes:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 5

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  - name: NODE_ENV
    value: production
  - name: LOG_LEVEL
    value: warn
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: my-app-prod-secrets
        key: database-url
