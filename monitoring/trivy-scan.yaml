# Trivy image vulnerability scanner — runs daily as a CronJob.
# Scans all images currently running in the default namespace.
# Results are in pod logs: kubectl logs -l app=trivy-scan --tail=100
#
# Apply with: kubectl apply -f monitoring/trivy-scan.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name: trivy-scan
  namespace: default
spec:
  schedule: "0 6 * * *"  # daily at 06:00 UTC
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: trivy-scan
        spec:
          automountServiceAccountToken: true
          serviceAccountName: trivy-scan
          containers:
            - name: trivy
              image: aquasec/trivy:0.58.2
              args:
                - k8s
                - --namespace=default
                - --report=summary
                - --severity=HIGH,CRITICAL
                - --timeout=10m
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          restartPolicy: Never
---
# ServiceAccount and RBAC for Trivy to read pod/image info
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trivy-scan
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trivy-scan
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trivy-scan
  namespace: default
subjects:
  - kind: ServiceAccount
    name: trivy-scan
    namespace: default
roleRef:
  kind: Role
  name: trivy-scan
  apiGroup: rbac.authorization.k8s.io
